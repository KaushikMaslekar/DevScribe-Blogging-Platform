name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 21


            - name: Run backend tests
              run: ./mvnw -B test

            - name: Compile backend
              run: ./mvnw -B -DskipTests compile

    frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install deps
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
