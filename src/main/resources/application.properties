spring.application.name=devscribe-api

server.port=8080
server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devscribe?options=-c%20TimeZone%3DUTC}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.default-property-inclusion=non_null
spring.data.redis.repositories.enabled=false

devscribe.security.jwt.secret=${JWT_SECRET:change-me-in-prod-with-256-bit-secret}
devscribe.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

devscribe.realtime.enabled=${REALTIME_ENABLED:false}
devscribe.realtime.supabase-url=${SUPABASE_URL:}
devscribe.realtime.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
devscribe.realtime.channel=${REALTIME_CHANNEL:public:posts}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
